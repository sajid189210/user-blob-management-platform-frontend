<article
  class="group relative flex flex-col overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm transition-all hover:shadow-md">
  <a [routerLink]="['/post', post.id]" class="block overflow-hidden">
    <img [src]="post.imageUrl" [alt]="post.title"
      class="h-48 w-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy" />
  </a>

  <div class="flex flex-1 flex-col p-5">
    <a [routerLink]="['/post', post.id]" class="after:absolute after:inset-0">
      <h3 class="text-lg font-semibold text-gray-900 line-clamp-2">{{ post.title }}</h3>
    </a>

    <p class="mt-2 text-sm leading-relaxed text-gray-600 line-clamp-3">{{ post.body }}</p>

    <div class="mt-auto flex items-center justify-between pt-4">
      <div class="flex items-center gap-2.5">
        <div
          class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 text-xs font-semibold text-white">
          {{ initial }}
        </div>
        <div class="text-sm">
          <p class="font-medium text-gray-900">{{ displayName }}</p>
          <p class="text-xs text-gray-500">{{ post.createdAt | date:'MMM d, yyyy' }}</p>
        </div>
      </div>

      <div class="flex items-center gap-1.5 text-sm text-gray-500">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
        <span>{{ post.likes }}</span>
      </div>
    </div>
  </div>
</article>
