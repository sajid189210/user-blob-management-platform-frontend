<app-header />

<main class="mx-auto min-h-[calc(100vh-8rem)] max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Liked Posts</h1>
    <p class="mt-1 text-sm text-gray-500">Posts you've liked</p>
  </div>

  @if (loading()) {
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (_ of [1,2,3,4,5,6]; track _) {
    <div class="flex flex-col overflow-hidden rounded-xl border border-gray-200 bg-white animate-pulse">
      <div class="h-48 w-full bg-gray-200"></div>
      <div class="flex flex-1 flex-col p-5">
        <div class="h-5 w-3/4 rounded bg-gray-200 mb-3"></div>
        <div class="space-y-2 mb-4">
          <div class="h-3 w-full rounded bg-gray-200"></div>
          <div class="h-3 w-5/6 rounded bg-gray-200"></div>
        </div>
        <div class="mt-auto flex items-center gap-2.5 pt-4 border-t border-gray-100">
          <div class="h-8 w-8 rounded-full bg-gray-200"></div>
          <div class="space-y-1">
            <div class="h-3 w-16 rounded bg-gray-200"></div>
            <div class="h-2 w-12 rounded bg-gray-200"></div>
          </div>
        </div>
      </div>
    </div>
    }
  </div>
  } @else if (posts().length === 0) {
  <div class="flex flex-col items-center justify-center py-20">
    <div class="flex h-20 w-20 items-center justify-center rounded-full bg-gray-100 mb-6">
      <i class="far fa-heart text-4xl text-gray-400"></i>
    </div>
    <h3 class="text-xl font-semibold text-gray-900 mb-2">No liked posts yet</h3>
    <p class="text-gray-500 text-sm mb-8">Start liking posts by clicking the heart icon!</p>
    <a routerLink="/home"
      class="rounded-full bg-gradient-to-r from-indigo-500 to-purple-600 px-6 py-3 text-sm font-semibold text-white shadow-sm transition-all hover:from-indigo-600 hover:to-purple-700 hover:shadow-md">
      Browse posts
    </a>
  </div>
  } @else {
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
    @for (post of posts(); track post.id) {
    <app-post-card [post]="post" [isLiked]="isLiked(post.id)" [currentUserId]="currentUserId" (toggleLike)="onToggleLike($event)" />
    }
  </div>
  }
</main>

<app-footer />
