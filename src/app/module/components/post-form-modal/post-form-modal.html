<div
  class="modal-backdrop fixed inset-0 z-[999] flex items-start justify-center overflow-y-auto bg-black/50 py-10 backdrop-blur-sm"
  (click)="onBackdropClick($event)"
>
  <div
    class="relative w-full max-w-2xl rounded-2xl bg-white shadow-2xl mx-4 animate-in"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between border-b border-gray-200 px-6 py-4">
      <div>
        <h2 class="text-lg font-bold text-gray-900">{{ isEdit ? 'Edit Post' : 'Create Post' }}</h2>
        <p class="text-sm text-gray-500">{{ isEdit ? 'Update your post' : 'Share your thoughts with the world' }}</p>
      </div>
      <button
        type="button"
        (click)="closeModal.emit()"
        class="flex h-8 w-8 items-center justify-center rounded-full text-gray-400 transition-colors hover:bg-gray-100 hover:text-gray-600"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form #postForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-5 px-6 py-5">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">Cover Image</label>

        @if (imageUrl) {
          <div class="relative overflow-hidden rounded-lg border border-gray-200">
            <img [src]="imageUrl" alt="Cover preview" class="h-44 w-full object-cover" />
            <div class="absolute inset-0 flex items-center justify-center gap-3 bg-black/0 opacity-0 transition-all hover:bg-black/40 hover:opacity-100">
              <button
                type="button"
                (click)="changeImage(fileInput)"
                class="cursor-pointer rounded-lg bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm transition-colors hover:bg-gray-50"
              >
                Change
              </button>
              <button
                type="button"
                (click)="removeImage()"
                class="cursor-pointer rounded-lg bg-red-500 px-4 py-2 text-sm font-medium text-white shadow-sm transition-colors hover:bg-red-600"
              >
                Remove
              </button>
            </div>
          </div>
        } @else {
          <div
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            (click)="fileInput.click()"
            class="relative flex cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed px-6 py-10 transition-colors"
            [class.border-red-400]="imageError"
            [class.bg-red-50]="imageError"
            [class.border-indigo-400]="dragOver && !imageError"
            [class.bg-indigo-50]="dragOver && !imageError"
            [class.border-gray-300]="!dragOver && !imageError"
            [class.bg-gray-50]="!dragOver && !imageError"
            [class.hover:border-indigo-400]="!dragOver && !imageError"
            [class.hover:bg-indigo-50]="!dragOver && !imageError"
          >
            <svg class="mb-3 h-10 w-10 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="text-sm font-medium text-gray-600">Click to upload or drag and drop</p>
            <p class="mt-1 text-xs text-gray-400">PNG, JPG, WebP or GIF (max 5MB)</p>
          </div>
        }

        @if (imageError) {
          <p class="mt-1.5 text-sm text-red-500">{{ imageError }}</p>
        }

        <input
          #fileInput
          type="file"
          accept="image/png,image/jpeg,image/webp,image/gif"
          (change)="onFileSelected($event)"
          class="hidden"
        />
      </div>

      <div>
        <label for="title" class="mb-1.5 block text-sm font-medium text-gray-700">Title</label>
        <input
          type="text"
          id="title"
          name="title"
          [(ngModel)]="title"
          required
          placeholder="Enter your post title..."
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition-colors focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
        />
      </div>

      <div>
        <label for="body" class="mb-1.5 block text-sm font-medium text-gray-700">Content</label>
        <textarea
          id="body"
          name="body"
          [(ngModel)]="body"
          required
          rows="10"
          placeholder="Write your post content here..."
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition-colors focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 resize-y"
        ></textarea>
      </div>

      <div>
        <label for="tags" class="mb-1.5 block text-sm font-medium text-gray-700">Tags</label>
        <input
          type="text"
          id="tags"
          name="tags"
          [(ngModel)]="tags"
          placeholder="angular, typescript, webdev"
          class="w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm text-gray-900 placeholder-gray-400 transition-colors focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
        />
        <p class="mt-1 text-xs text-gray-500">Separate tags with commas</p>
      </div>

      <div>
        <label class="mb-1.5 block text-sm font-medium text-gray-700">Status</label>
        <div class="flex gap-4">
          <label class="flex cursor-pointer items-center gap-2">
            <input
              type="radio"
              name="status"
              [value]="'draft'"
              [(ngModel)]="status"
              class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-500"
            />
            <span class="text-sm text-gray-700">Draft</span>
          </label>
          <label class="flex cursor-pointer items-center gap-2">
            <input
              type="radio"
              name="status"
              [value]="'published'"
              [(ngModel)]="status"
              class="h-4 w-4 border-gray-300 text-indigo-600 focus:ring-indigo-500"
            />
            <span class="text-sm text-gray-700">Published</span>
          </label>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 border-t border-gray-200 pt-5">
        <button
          type="button"
        (click)="closeModal.emit()"
        class="rounded-lg border border-gray-300 bg-white px-5 py-2.5 text-sm font-medium text-gray-700 transition-colors hover:bg-gray-50"
      >
        Cancel
        </button>
        <button
          type="submit"
          [disabled]="postForm.invalid || submitting"
          class="inline-flex items-center gap-2 rounded-lg bg-gradient-to-r from-indigo-500 to-purple-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition-all hover:from-indigo-600 hover:to-purple-700 hover:shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (submitting) {
            <svg class="h-4 w-4 animate-spin" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          }
          {{ isEdit ? 'Update Post' : 'Publish Post' }}
        </button>
      </div>
    </form>
  </div>
</div>
