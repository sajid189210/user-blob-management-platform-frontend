<div class="min-h-screen flex">
  <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-800 relative items-center justify-center p-12">
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTM2IDM0djItSDI0di0yaDEyek0zNiAyNHYySDI0di0yaDEyeiIvPjwvZz48L2c+PC9zdmc+')] opacity-30"></div>
    <div class="relative z-10 text-center">
      <div class="flex items-center justify-center gap-3 mb-8">
        <svg class="w-12 h-12 text-white animate-float" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="6" width="32" height="36" rx="4" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <line x1="14" y1="16" x2="34" y2="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="14" y1="23" x2="30" y2="23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="14" y1="30" x2="26" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M34 34l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="text-4xl font-bold text-white tracking-tight">DraftPad</span>
      </div>
      <svg class="w-80 h-80 mx-auto mb-8" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle class="animate-spin-slow" cx="200" cy="200" r="180" stroke="white" stroke-opacity="0.1" stroke-width="2" fill="none"/>
        <circle class="animate-spin-slow-reverse" cx="200" cy="200" r="140" stroke="white" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
        <rect class="animate-breathe" x="100" y="80" width="200" height="240" rx="12" fill="white" fill-opacity="0.12" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
        <line x1="130" y1="130" x2="270" y2="130" stroke="white" stroke-opacity="0.25" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="130" y1="155" x2="240" y2="155" stroke="white" stroke-opacity="0.15" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="130" y1="180" x2="260" y2="180" stroke="white" stroke-opacity="0.15" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="130" y1="205" x2="230" y2="205" stroke="white" stroke-opacity="0.15" stroke-width="2.5" stroke-linecap="round"/>
        <path class="animate-float" d="M275 95l25 25-70 70-25-25 70-70z" fill="white" fill-opacity="0.2" stroke="white" stroke-opacity="0.3" stroke-width="1.5" stroke-linejoin="round"/>
        <path class="animate-float-delayed" d="M230 170l25 25" stroke="white" stroke-opacity="0.3" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="110" y="260" width="180" height="40" rx="6" fill="white" fill-opacity="0.08"/>
        <line x1="130" y1="280" x2="270" y2="280" stroke="white" stroke-opacity="0.12" stroke-width="2" stroke-linecap="round"/>
        <circle class="animate-pulse-soft" cx="330" cy="290" r="30" fill="white" fill-opacity="0.08" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
        <path class="animate-pulse-soft" d="M320 290l8 8 16-16" stroke="white" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="animate-twinkle" cx="70" cy="120" r="20" fill="white" fill-opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
        <circle class="animate-twinkle-delayed" cx="80" cy="115" r="4" fill="white" fill-opacity="0.15"/>
        <circle class="animate-twinkle" cx="70" cy="125" r="2" fill="white" fill-opacity="0.1"/>
      </svg>
      <p class="text-white text-lg font-light leading-relaxed max-w-md mx-auto">Write, refine, and organize your thoughts with elegant simplicity.</p>
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center p-6 bg-gray-50">
    <div class="w-full max-w-md">
      <div class="lg:hidden flex items-center justify-center gap-2 mb-10">
        <svg class="w-8 h-8 text-indigo-600" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="6" width="32" height="36" rx="4" stroke="currentColor" stroke-width="2.5" fill="none"/>
          <line x1="14" y1="16" x2="34" y2="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="14" y1="23" x2="30" y2="23" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="14" y1="30" x2="26" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M34 34l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
        <span class="text-2xl font-bold text-gray-900">DraftPad</span>
      </div>

      <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-900">{{ heading }}</h1>
        <p class="text-gray-500 mt-2">{{ subtitle }}</p>
      </div>

      <form #authForm="ngForm" (ngSubmit)="submit()" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            #emailInput="ngModel"
            required
            email
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-gray-900 placeholder-gray-400 bg-white shadow-sm"
            placeholder="you@example.com"
          />
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            @if (isLogin) {
              <button type="button" (click)="goToForgotPassword()" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">Forgot password?</button>
            }
          </div>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            #passwordInput="ngModel"
            required
            minlength="4"
            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-gray-900 placeholder-gray-400 bg-white shadow-sm"
            [placeholder]="isLogin ? 'Enter your password' : 'Create a password'"
          />
        </div>

        @if (!isLogin) {
          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1.5">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              #confirmPasswordInput="ngModel"
              required
              minlength="4"
              class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-gray-900 placeholder-gray-400 bg-white shadow-sm"
              placeholder="Confirm your password"
            />
            @if (confirmPasswordInput.touched && password !== confirmPassword) {
              <p class="mt-1.5 text-sm text-red-500">Passwords do not match</p>
            }
          </div>
        }

        <button
          type="submit"
          [disabled]="authForm.invalid || (!isLogin && password !== confirmPassword)"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 disabled:cursor-not-allowed text-white font-semibold rounded-xl transition cursor-pointer shadow-sm"
        >
          {{ submitLabel }}
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-8">
        {{ altText }}
        <button type="button" (click)="switchMode()" class="font-medium text-indigo-600 hover:text-indigo-500 cursor-pointer">{{ altAction }}</button>
      </p>
    </div>
  </div>
</div>
