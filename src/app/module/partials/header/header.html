<header class="sticky top-0 z-50 w-full border-b border-gray-200 bg-white/80 backdrop-blur-md">
  <div class="mx-auto flex h-16 max-w-7xl items-center gap-4 px-4 sm:px-6 lg:px-8">
    <a routerLink="/home" class="flex items-center gap-2.5 shrink-0">
      <svg class="h-8 w-8" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="url(#brand-gradient)"/>
        <path d="M12 28V14l6-4v18l-6-4zM22 28V10l6 4v14l-6-4z" fill="#fff" opacity="0.9"/>
        <defs>
          <linearGradient id="brand-gradient" x1="0" y1="0" x2="40" y2="40">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="text-xl font-bold tracking-tight text-gray-900">DraftPad</span>
    </a>

    <div class="relative flex-1 max-w-md mx-auto">
      <input
        type="search"
        name="search"
        [(ngModel)]="searchQuery"
        placeholder="Search posts..."
        class="w-full rounded-full border border-gray-300 bg-gray-50 py-2 pl-10 pr-4 text-sm text-gray-900 placeholder-gray-400 transition-colors focus:border-indigo-500 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
      />
      <button type="button" (click)="onSearch()"
        class="absolute right-1 top-1/2 -translate-y-1/2 flex items-center justify-center rounded-full bg-indigo-600 px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-indigo-700">
        <i class="fas fa-search text-xs"></i>
      </button>
    </div>

    <nav class="hidden md:flex items-center gap-1">
      <a routerLink="/my-posts" class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900">
        <i class="fas fa-pen-fancy text-xs"></i>
        <span>My Posts</span>
      </a>
      <a routerLink="/liked" class="flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900">
        <i class="fas fa-heart text-xs"></i>
        <span>Liked</span>
      </a>
    </nav>

    @if ((user$ | async); as user) {
      <div class="flex items-center gap-3 shrink-0">
        <div class="flex items-center gap-2.5">
          <div class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-xs font-semibold text-white shadow-sm select-none">
            {{ user.name ? user.name.charAt(0).toUpperCase() : user.email.charAt(0).toUpperCase() }}
          </div>
          <div class="hidden sm:block min-w-0">
            <p class="truncate text-sm font-semibold text-gray-900 leading-tight">{{ user.name || 'User' }}</p>
            <p class="truncate text-xs text-gray-500 leading-tight">{{ user.email }}</p>
          </div>
        </div>

        <button
          type="button"
          (click)="onLogout()"
          class="flex h-9 w-9 items-center justify-center rounded-full border border-gray-200 bg-white text-red-500 transition-colors hover:bg-red-50 hover:border-red-200"
          aria-label="Logout"
        >
          <i class="fas fa-sign-out-alt text-sm"></i>
        </button>
      </div>
    } @else {
      <div class="flex items-center gap-2 shrink-0">
        <a routerLink="/login" class="rounded-lg px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100 hover:text-gray-900">Sign in</a>
        <a routerLink="/signup" class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white transition-colors hover:bg-indigo-700">Sign up</a>
      </div>
    }
  </div>
</header>
